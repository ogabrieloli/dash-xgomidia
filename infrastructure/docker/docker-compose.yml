version: '3.9'

services:
  # ─── PostgreSQL 16 ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: xgo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: xgo
      POSTGRES_PASSWORD: xgo_dev_password
      POSTGRES_DB: xgo_platform
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U xgo -d xgo_platform' ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis 7 ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: xgo_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ 'CMD', 'redis-cli', 'ping' ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── HashiCorp Vault (dev mode) ────────────────────────────────
  # ATENÇÃO: dev mode não é persistente — apenas para desenvolvimento local
  vault:
    image: hashicorp/vault:1.16
    container_name: xgo_vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: 'root'
      VAULT_DEV_LISTEN_ADDRESS: '0.0.0.0:8200'
    ports:
      - '8200:8200'
    command: server -dev
    healthcheck:
      test: [ 'CMD', 'vault', 'status', '-address=http://127.0.0.1:8200' ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Mailpit (e-mail dev) ──────────────────────────────────────
  # Captura todos os e-mails enviados em desenvolvimento
  mailpit:
    image: axllent/mailpit:latest
    container_name: xgo_mailpit
    restart: unless-stopped
    ports:
      - '8025:8025' # UI web
      - '1025:1025' # SMTP
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
  postgres_data:
  redis_data:
